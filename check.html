<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радио · Проверка серверов</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&display=swap');
        * {
            font-family: "Unbounded", sans-serif;
            font-weight: 300 !important;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0c12;
            background: radial-gradient(circle at 30% 20%, #1a1e28, #07090e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 10px;
        }
        .table-container {
            width: 100%;
            max-width: 1500px;
            background: #0f1219;
            border: 1px solid #2a2f3b;
            box-shadow: 0 20px 40px -10px #00000080, 0 0 0 1px #2f3543 inset;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #0f1219;
            color: #e0e6f0;
            font-size: 0.95rem;
        }
        th {
            text-align: left;
            padding: 5px 5px;
            background: #1a1e2a;
            color: #b7c7e0;
            font-weight: 600;
            letter-spacing: 0.02em;
            border-bottom: 1px solid #2d3443;
            text-transform: uppercase;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        td {
            padding: 5px;
            border-bottom: 1px solid #212634;
            color: #cdd9f0;
            vertical-align: middle;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background: #1b202d;
        }
        tr:nth-child(even) {
            background: #0c0f16;
        }
        tr:nth-child(even):hover td {
            background: #171d2b;
        }

        .number-col {
            font-size: 12px;
            text-align: center;
            background: #07090e;
            color: #68faff;
            font-weight: 500;
            width: 55px;
        }
        .logo-col {
            width: 60px;
        }
        .logo-img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid #2f3543;
            background: #1a1e2a;
        }
        .logo-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #1a1e2a;
            border: 2px solid #2f3543;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #4f6080;
        }
        .title-col {
            font-weight: 500;
            color: #f0f4ff;
            width: 250px;
        }
        .status-col {
            width: 150px;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.25rem 1.2rem 0.25rem 1rem;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: 500;
            background: #1b212e;
            color: #cedbeb;
            border: 1px solid #353f53;
            white-space: nowrap;
        }
        .status-working {
            background: #0e2a1d;
            color: #a0e0b0;
            border-color: #2a6f44;
        }
        .status-broken {
            background: #2b1717;
            color: #f9b5b5;
            border-color: #994141;
        }
        .status-ssl {
            background: #2d2410;
            color: #f3da9b;
            border-color: #9e751f;
        }
        .status-wait {
            background: #1c2332;
            color: #b3c6ea;
            border-color: #3d4a68;
        }
        .url-col {
            max-width: 300px;
        }
        .url-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .server-url {
            background: #1f2638;
            color: #9eb4e0;
            text-decoration: none;
            font-size: 0.8rem;
            padding: 0.2rem 1rem 0.2rem 0.9rem;
            border-radius: 5px;
            border: 1px solid #364153;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.1s;
            white-space: nowrap;
            /* max-width: 250px; */
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .server-url:hover {
            background: #2a3450;
            border-color: #5a74a6;
            color: #d4e3ff;
        }
        .external-link {
            background: #1f2638;
            color: #9eb4e0;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.2rem 0.7rem;
            border-radius: 5px;
            border: 1px solid #364153;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: 0.1s;
        }
        .external-link:hover {
            background: #2a3450;
            border-color: #5a74a6;
            color: #d4e3ff;
        }
        .top-section {
            padding: 1.5rem 1.5rem 0.5rem 1.5rem;
            background: #0b0e14;
            border-bottom: 1px solid #252c3a;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .header-row h2 {
            font-weight: 450;
            font-size: 1.8rem;
            color: #d2e1ff;
            letter-spacing: -0.02em;
        }
        .stats {
            display: flex;
            gap: 5px;
        }
        .stat-item {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            color: #b7c6e0;
        }
        .stat-value {
            font-weight: 600;
            background: #1f2638;
            padding: 0.2rem 1rem;
            border-radius: 5px;
            color: #dde9ff;
        }
        #workingCount {
            background: #0e2a1d;
            color: #a0e0b0;
            border: 1px solid #2a6f44;
        }
        #brokenCount {
            background: #2b1717;
            color: #f9b5b5;
            border: 1px solid #994141;
        }
        #sslCount {
            background: #2d2410;
            color: #f3da9b;
            border: 1px solid #9e751f;
        }
        #totalCount {
            background: #1c2332;
            color: #b3c6ea;
            border: 1px solid #3d4a68;
        }
        .search-section {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            margin: 1rem 0 0.5rem 0;
        }
        .search-input {
            background: #11161f;
            border: 1px solid #2a3145;
            padding: 0.8rem 1.3rem;
            border-radius: 5px;
            min-width: 260px;
            color: #eef4ff;
            font-size: 0.95rem;
            outline: none;
            transition: 0.15s;
        }
        .search-input::placeholder {
            color: #4f6080;
        }
        .search-input:focus {
            border-color: #4f6e9e;
            background: #151d2b;
        }
        .filter-group {
            display: flex;
            gap: 0.2rem;
            background: #191f2c;
            padding: 0.25rem;
            border-radius: 5px;
            border: 1px solid #2b3243;
        }
        .filter-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1.3rem;
            border-radius: 5px;
            font-weight: 500;
            color: #aeb9d0;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
        }
        .filter-btn.active {
            background: #232b3f;
            color: #ffffff;
            box-shadow: 0 2px 5px #00000040;
        }
        .filter-btn:hover {
            background: #2b344b;
            color: #fff;
        }
        .loader-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 5px;
            background: #7e94bc;
            margin: 0 2px;
            animation: pulse 1.4s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 1; } }
        .footer-note {
            padding: 0.8rem 1.5rem 1.2rem 1.5rem;
            font-size: 0.8rem;
            color: #3d4b64;
            border-top: 1px solid #212837;
            background: #0a0d13;
            display: flex;
            justify-content: space-between;
        }
        .inv-info {
            color: #566f99;
        }
        .desc-col {
            color: #8f9fbf;
            font-size: 0.8rem;
            max-width: 150px;
        }
        .station-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .station-name {
            font-weight: 500;
            color: #f0f4ff;
        }
        .station-desc {
            font-size: 0.7rem;
            color: #7f8fb0;
        }
        .favicon {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
    </style>
    <script src="list.js"></script>
</head>
<body>
<div class="table-container">
    <div class="top-section">
        <div class="header-row">
            <div class="stats">
                <div class="stat-item"><span class="stat-value" id="totalCount">0</span></div>
                <div class="stat-item"><span class="stat-value" id="workingCount">0</span></div>
                <div class="stat-item"><span class="stat-value" id="brokenCount">0</span></div>
                <div class="stat-item"><span class="stat-value" id="sslCount">0</span></div>
            </div>
        </div>
        <div class="search-section">
            <input type="text" class="search-input" id="searchInput" placeholder="поиск по названию / описанию">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="working">Работает</button>
                <button class="filter-btn" data-filter="broken">Не работает</button>
                <button class="filter-btn" data-filter="ssl">Ошибка SSL</button>
            </div>
        </div>
    </div>

    <table id="radioTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Лого</th>
                <th>Название</th>
                <th>Сервер</th>
                <th>Статус</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="5" style="text-align:center; padding:3rem; background:#0e121b; color:#637394;">загрузка радиостанций...</td></tr>
        </tbody>
    </table>
</div>

<script>
(function() {
    if (typeof fm_list === 'undefined') {
        document.getElementById('tableBody').innerHTML = `<tr><td colspan="5" style="text-align:center; padding:2rem; color:#b77a7a;">✗ fm_list не найден. Подключи radio.js</td></tr>`;
        return;
    }

    // Преобразуем плоский список в массив объектов
    function parseFMList(list) {
        const stations = [];
        for (let i = 0; i < list.length; i += 5) {
            if (i + 4 < list.length) {
                stations.push({
                    name: list[i],
                    logo: list[i + 1],
                    url: list[i + 2],
                    description: list[i + 3],
                    favicon: list[i + 4],
                    originalIdx: stations.length
                });
            }
        }
        return stations;
    }

    const rawStations = parseFMList(fm_list);
    const TOTAL_STATIONS = rawStations.length;

    // Добавляем поля для статуса
    const stations = rawStations.map((station, idx) => ({
        ...station,
        displayId: idx + 1, // просто порядковый номер
        status: 'waiting',
        statusMsg: 'Проверка...'
    }));

    const tbody = document.getElementById('tableBody');
    const totalSpan = document.getElementById('totalCount');
    const workingSpan = document.getElementById('workingCount');
    const brokenSpan = document.getElementById('brokenCount');
    const sslSpan = document.getElementById('sslCount');
    const searchInput = document.getElementById('searchInput');
    const filterBtns = document.querySelectorAll('.filter-btn');

    let currentFilter = 'all';
    let searchTerm = '';

    // Сохраняем ссылки на DOM-элементы строк
    const rowElements = new Map();

    function renderTable() {
        const filtered = stations.filter(s => {
            if (currentFilter !== 'all') {
                if (currentFilter === 'working' && s.status !== 'working') return false;
                if (currentFilter === 'broken' && s.status !== 'broken') return false;
                if (currentFilter === 'ssl' && s.status !== 'ssl') return false;
            }
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                const nameMatch = s.name.toLowerCase().includes(term);
                const descMatch = s.description.toLowerCase().includes(term);
                return nameMatch || descMatch;
            }
            return true;
        });

        if (filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:2.5rem; background:#0f131c; color:#677b9e;">└ нет радиостанций ┘</td></tr>`;
            updateCounters();
            rowElements.clear();
            return;
        }

        let html = '';
        filtered.forEach(s => {
            let statusClass = 'status-wait';
            let statusIcon = '<span class="loader-group"><span class="loader-dot"></span><span class="loader-dot" style="animation-delay:0.2s;"></span><span class="loader-dot" style="animation-delay:0.4s;"></span></span>';
            let statusText = s.statusMsg;

            if (s.status === 'working') {
                statusClass = 'status-working';
                statusIcon = '✓';
                statusText = 'Доступен';
            } else if (s.status === 'broken') {
                statusClass = 'status-broken';
                statusIcon = '✗';
                statusText = 'Недоступен';
            } else if (s.status === 'ssl') {
                statusClass = 'status-ssl';
                statusIcon = '⚠';
                statusText = 'Ошибка SSL';
            }

            // Обработка логотипа
            const logoHtml = s.logo && s.logo !== 'img/' && !s.logo.includes('placeholder') 
                ? `<img class="logo-img" src="${s.logo}" alt="${s.name}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2240%22%20height%3D%2240%22%20viewBox%3D%220%200%2040%2040%22%3E%3Crect%20width%3D%2240%22%20height%3D%2240%22%20fill%3D%22%231a1e2a%22%2F%3E%3Ctext%20x%3D%228%22%20y%3D%2226%22%20fill%3D%22%234f6080%22%20font-size%3D%2218%22%3E📻%3C%2Ftext%3E%3C%2Fsvg%3E'">`
                : `<div class="logo-placeholder">📻</div>`;

            html += `<tr data-station-id="${s.displayId}">
                <td class="number-col">${s.displayId}</td>
                <td class="logo-col">${logoHtml}</td>
                <td class="title-col">
                    <div class="station-info">
                        <span class="station-name">${s.name}</span>
                        <span class="station-desc">${s.description || '—'}</span>
                    </div>
                </td>
                <td class="url-col">
                    <div class="url-cell">
                        <a class="server-url" href="${s.url}" target="_blank" title="${s.url}">
                            <span>🔊</span> ${s.url}
                        </a>
                        
                    </div>
                </td>
                <td class="status-col"><span class="status ${statusClass}" data-status-cell="true"><i>${statusIcon}</i> ${statusText}</span></td>
            </tr>`;
        });
        
        tbody.innerHTML = html;
        
        // Сохраняем ссылки на элементы строк
        rowElements.clear();
        filtered.forEach(s => {
            const row = tbody.querySelector(`tr[data-station-id="${s.displayId}"]`);
            if (row) {
                rowElements.set(s.displayId, {
                    row: row,
                    statusCell: row.querySelector('.status')
                });
            }
        });
        
        updateCounters();
    }

    function updateCounters() {
        totalSpan.innerText = `Всего: ${stations.length}`;
        workingSpan.innerText = `Работает: ${stations.filter(s => s.status === 'working').length}`;
        brokenSpan.innerText = `Не работает: ${stations.filter(s => s.status === 'broken').length}`;
        sslSpan.innerText = `SSL ошибка: ${stations.filter(s => s.status === 'ssl').length}`;
    }

    function refreshStation(displayId) {
        const station = stations.find(s => s.displayId === displayId);
        if (!station) return;
        
        updateCounters();
        
        const rowData = rowElements.get(displayId);
        if (!rowData) return;
        
        const statusSpan = rowData.statusCell;
        if (!statusSpan) return;
        
        let statusClass = 'status-wait';
        let statusIcon = '<span class="loader-group"><span class="loader-dot"></span><span class="loader-dot" style="animation-delay:0.2s;"></span><span class="loader-dot" style="animation-delay:0.4s;"></span></span>';
        let statusText = station.statusMsg;

        if (station.status === 'working') {
            statusClass = 'status-working';
            statusIcon = '✓';
            statusText = 'Доступен';
        } else if (station.status === 'broken') {
            statusClass = 'status-broken';
            statusIcon = '✗';
            statusText = 'Недоступен';
        } else if (station.status === 'ssl') {
            statusClass = 'status-ssl';
            statusIcon = '⚠';
            statusText = 'Ошибка SSL';
        }
        
        statusSpan.className = `status ${statusClass}`;
        statusSpan.innerHTML = `<i>${statusIcon}</i> ${statusText}`;
    }

    async function checkStation(station) {
        if (!station.url || typeof station.url !== 'string') {
            station.status = 'broken';
            station.statusMsg = 'нет ссылки';
            refreshStation(station.displayId);
            return;
        }
        
        let url = station.url.trim();
        if (!url.startsWith('http')) {
            station.status = 'broken';
            station.statusMsg = 'неверный формат';
            refreshStation(station.displayId);
            return;
        }

        // Для радио потоков используем HEAD запрос с таймаутом
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000); // 8 секунд таймаут

            let response = await fetch(url, {
                method: 'HEAD',
                signal: controller.signal,
                mode: 'no-cors' // Для кросс-доменных запросов
            }).catch(async () => {
                // Если HEAD не сработал, пробуем GET
                const c2 = new AbortController();
                const t2 = setTimeout(() => c2.abort(), 8000);
                const r2 = await fetch(url, {
                    method: 'GET',
                    signal: c2.signal,
                    mode: 'no-cors'
                }).catch(e => { throw e; });
                clearTimeout(t2);
                return r2;
            });

            clearTimeout(timeoutId);

            // При no-cors мы не можем прочитать статус, но если запрос не упал - скорее всего работает
            if (response.type === 'opaque' || response.status === 0) {
                station.status = 'working';
                station.statusMsg = 'Доступен';
            } else if (response.status >= 200 && response.status < 400) {
                station.status = 'working';
                station.statusMsg = `HTTP ${response.status}`;
            } else {
                station.status = 'broken';
                station.statusMsg = `HTTP ${response.status}`;
            }
        } catch (err) {
            const msg = err.message || '';
            if (msg.includes('SSL') || msg.includes('certificate') || msg.includes('CERT') || msg.includes('secure')) {
                station.status = 'ssl';
                station.statusMsg = 'SSL ошибка';
            } else if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('abort') || msg.includes('network') || msg.includes('timed out')) {
                station.status = 'broken';
                station.statusMsg = 'сервер недоступен';
            } else {
                station.status = 'broken';
                station.statusMsg = 'ошибка';
            }
        }
        refreshStation(station.displayId);
    }

    function startChecks() {
        stations.forEach(s => checkStation(s).catch(e => console.warn(`Ошибка проверки ${s.name}:`, e)));
    }

    function applyFilters() {
        renderTable();
    }

    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            applyFilters();
        });
    });

    searchInput.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        applyFilters();
    });

    // Начальный рендер
    renderTable();
    // Запуск проверки
    startChecks();
})();
</script>
</body>
</html>

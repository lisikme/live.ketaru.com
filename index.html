            <script>
                const phrases = [
                    '{#000000::⚡}{#9e9e9e::Приложение}', 
                    '{#000000::✨}{#99FF99::Бесплатно!}', 
                    '{#000000::⚙️}{#FF6666::Работает 24/7}', 
                    '{#000000::🏆}{#ffdb5c::Мы #1...}',
                ];
                let current = 0;
                let isDeleting = false;
                let text = '';
                let index = 0;
                let typingSpeed = 150; // скорость печати (мс)
                function parseFormattedText(phrase) {
                    const regex = /{([^}]+)::([^}]+)}/g;
                    let match;
                    let lastIndex = 0;
                    const parts = [];
                    while ((match = regex.exec(phrase)) !== null) {
                        if (match.index > lastIndex) {
                            parts.push({text: phrase.substring(lastIndex, match.index), color: null});
                        }
                        parts.push({text: match[2], color: match[1]});
                        lastIndex = match.index + match[0].length;
                    }
                    if (lastIndex < phrase.length) {
                        parts.push({text: phrase.substring(lastIndex), color: null});
                    }
                    return parts;
                }
                function buildTextElement(parts, currentLength) {
                    let result = '';
                    let accumulatedLength = 0;
                    for (const part of parts) {
                        if (accumulatedLength >= currentLength) break;
                        const partText = part.text;
                        const availableLength = currentLength - accumulatedLength;
                        const displayText = partText.substring(0, availableLength);
                        if (part.color) {
                            result += `<span class="colored" style="--color: ${part.color}">${displayText}</span>`;
                        } else {result += displayText;}
                        accumulatedLength += partText.length;
                    }
                    return result;
                }
                function type() {
                    const currentPhrase = phrases[current];
                    const isFormatted = currentPhrase.includes('{');
                    if (isDeleting) {index--;} else {index++;}
                    if (isFormatted) {
                        const parts = parseFormattedText(currentPhrase);
                        text = buildTextElement(parts, index);
                    } else {
                        text = currentPhrase.substring(0, index);
                    }
                    document.getElementById('logo-text').innerHTML = text;
                    if (!isDeleting && index === currentPhrase.length) {
                        // Пауза после полного набора
                        typingSpeed = 1000;
                        isDeleting = true;
                    } else if (isDeleting && index === 0) {
                        // Переход к следующей фразе
                        isDeleting = false;
                        current = (current + 1) % phrases.length;
                        typingSpeed = 500;
                    } else if (isDeleting) {
                        // Ускорение удаления
                        typingSpeed = 40;
                    } else {
                        // Обычная скорость набора
                        typingSpeed = 40;
                    }
                    setTimeout(type, typingSpeed);
                }
                // Запускаем анимацию
                setTimeout(type, 1000);
            </script>
